name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Extract SDK from Striim image
        run: |
          CONTAINER=$(docker create --entrypoint /bin/bash striim/evalversion:latest \
            -c "dpkg -i /tmp/striim-node-*-Linux.deb 2>/dev/null")
          docker start -a "$CONTAINER"
          mkdir -p lib
          docker cp "$CONTAINER:/opt/striim/StriimSDK/StriimOpenProcessor-SDK.jar" lib/
          docker rm "$CONTAINER"
      - run: mvn -B package -DskipTests
      - uses: github/codeql-action/analyze@v3
