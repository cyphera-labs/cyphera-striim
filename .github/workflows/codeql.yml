name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Extract Striim SDK or create stub
        run: |
          mkdir -p lib
          # Try to create a minimal stub JAR for CodeQL analysis
          mkdir -p stub/com/striim/proc
          cat > stub/com/striim/proc/OpenProcessor.java << 'JAVA'
          package com.striim.proc;
          public abstract class OpenProcessor {
            public abstract void init() throws Exception;
            public abstract Object process(Object input) throws Exception;
            public abstract void close() throws Exception;
          }
          JAVA
          javac stub/com/striim/proc/OpenProcessor.java
          cd stub && jar cf ../lib/StriimOpenProcessor-SDK.jar com/ && cd ..
          rm -rf stub
      - run: mvn -B package -DskipTests
      - uses: github/codeql-action/analyze@v3
