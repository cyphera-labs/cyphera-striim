name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Install Striim SDK and build
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$PWD:/build" \
            -w /build \
            striim/evalversion:latest \
            -c "
              dpkg -i /tmp/striim-node-*-Linux.deb 2>/dev/null
              mkdir -p lib
              cp /opt/striim/StriimSDK/StriimOpenProcessor-SDK.jar lib/
              mvn -B package -DskipTests
            "
      - uses: github/codeql-action/analyze@v3
