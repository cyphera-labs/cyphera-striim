name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Extract Striim SDK or create stub
        run: |
          mkdir -p lib
          mkdir -p stub/com/striim/proc stub/com/webaction/anno stub/com/webaction/runtime/components/openprocessor
          cat > stub/com/webaction/anno/AdapterType.java << 'JAVA'
          package com.webaction.anno;
          public @interface AdapterType { String name(); String type(); }
          JAVA
          cat > stub/com/webaction/anno/PropertyTemplate.java << 'JAVA'
          package com.webaction.anno;
          import java.lang.annotation.*; @Retention(RetentionPolicy.RUNTIME)
          public @interface PropertyTemplate { String name(); String type(); PropertyTemplateProperty[] properties(); }
          JAVA
          cat > stub/com/webaction/anno/PropertyTemplateProperty.java << 'JAVA'
          package com.webaction.anno;
          import java.lang.annotation.*; @Retention(RetentionPolicy.RUNTIME)
          public @interface PropertyTemplateProperty { String name(); String type(); boolean required(); String defaultValue() default ""; String description() default ""; }
          JAVA
          cat > stub/com/webaction/runtime/components/openprocessor/StriimOpenProcessor.java << 'JAVA'
          package com.webaction.runtime.components.openprocessor;
          public abstract class StriimOpenProcessor {
            public abstract void init(java.util.Map<String, Object> props, java.util.Map<String, Object> props2) throws Exception;
            public abstract Object process(Object input) throws Exception;
            public abstract void close() throws Exception;
          }
          JAVA
          javac stub/com/webaction/anno/*.java stub/com/webaction/runtime/components/openprocessor/*.java
          cd stub && jar cf ../lib/StriimOpenProcessor-SDK.jar com/ && cd ..
          rm -rf stub
      - run: mvn -B package -DskipTests
      - uses: github/codeql-action/analyze@v3
