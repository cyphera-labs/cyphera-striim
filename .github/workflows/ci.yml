name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Extract Striim SDK
        run: |
          mkdir -p lib
          docker pull striim/evalversion:latest || docker pull striim/striim:latest || true
          CONTAINER=$(docker create striim/evalversion:latest 2>/dev/null || docker create striim/striim:latest 2>/dev/null || echo "")
          if [ -n "$CONTAINER" ]; then
            docker cp "$CONTAINER:/opt/striim/StriimSDK/StriimOpenProcessor-SDK.jar" lib/ 2>/dev/null || \
            docker cp "$CONTAINER:/opt/striim/lib/StriimOpenProcessor-SDK.jar" lib/ 2>/dev/null || \
            echo "Could not find SDK JAR in container"
            docker rm "$CONTAINER"
          fi
          if [ ! -f lib/StriimOpenProcessor-SDK.jar ]; then
            echo "::warning::Striim SDK not available — creating stub JAR for compilation"
            mkdir -p stub/com/striim/proc stub/com/webaction/anno stub/com/webaction/runtime/components/openprocessor
            cat > stub/com/webaction/anno/AdapterType.java << 'JAVA'
          package com.webaction.anno;
          public class AdapterType { public static final String process = "process"; public static final String source = "source"; public static final String target = "target"; }
          JAVA
            cat > stub/com/webaction/anno/PropertyTemplate.java << 'JAVA'
          package com.webaction.anno;
          import java.lang.annotation.*; @Retention(RetentionPolicy.RUNTIME)
          public @interface PropertyTemplate { String name(); Class<?> type(); PropertyTemplateProperty[] properties(); }
          JAVA
            cat > stub/com/webaction/anno/PropertyTemplateProperty.java << 'JAVA'
          package com.webaction.anno;
          import java.lang.annotation.*; @Retention(RetentionPolicy.RUNTIME)
          public @interface PropertyTemplateProperty { String name(); Class<?> type(); boolean required(); String defaultValue() default ""; String description() default ""; }
          JAVA
            cat > stub/com/webaction/runtime/components/openprocessor/StriimOpenProcessor.java << 'JAVA'
          package com.webaction.runtime.components.openprocessor;
          public abstract class StriimOpenProcessor {
            public abstract void init(java.util.Map<String, Object> props, java.util.Map<String, Object> props2) throws Exception;
            public abstract Object process(Object input) throws Exception;
            public abstract void close() throws Exception;
          }
          JAVA
            javac stub/com/webaction/anno/*.java
            javac -cp stub stub/com/webaction/runtime/components/openprocessor/*.java
            cd stub && jar cf ../lib/StriimOpenProcessor-SDK.jar com/ && cd ..
            rm -rf stub
          fi
      - run: mvn -B package -DskipTests
