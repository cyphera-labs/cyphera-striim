name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build inside Striim container
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$PWD:/build" \
            -w /build \
            striim/evalversion:latest \
            -c "
              dpkg -i /tmp/striim-node-*-Linux.deb 2>/dev/null
              mkdir -p lib
              cp /opt/striim/StriimSDK/StriimOpenProcessor-SDK.jar lib/
              mvn -B package -DskipTests
            "
